<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cercar llibres</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="/" class="back-link">← Biblioteca</a>
    </div>
    <form action="/search-books" method="get" class="header-search">
        <input type="text" name="q" th:value="${query}" placeholder="Cerca un llibre...">
        <button type="submit">Cercar</button>
    </form>
</header>

<main class="main">

    <h2 class="search-title" th:if="${query != null and !#strings.isEmpty(query)}">
        Resultats per "<span th:text="${query}"></span>"
    </h2>

    <div th:if="${results == null or #lists.isEmpty(results)}" class="empty-state">
        <div style="font-size:56px">🔍</div>
        <p th:if="${query != null and !#strings.isEmpty(query)}">No s'han trobat resultats per "<span th:text="${query}"></span>".</p>
        <p th:unless="${query != null and !#strings.isEmpty(query)}">Escriu un títol per cercar.</p>
    </div>

    <div class="search-results-list" th:unless="${results == null or #lists.isEmpty(results)}">
        <div th:each="result : ${results}" class="result-card">

            <div class="result-cover">
                <img th:if="${result.coverUrl != null}" th:src="${result.coverUrl}" th:alt="${result.title}">
                <span th:unless="${result.coverUrl != null}">📚</span>
            </div>

            <div class="result-info">
                <div class="result-title"  th:text="${result.title}">Títol</div>
                <div class="result-author" th:text="${result.author}">Autor</div>
                <div class="result-meta">
                    <span th:if="${result.genre != null}"      th:text="${result.genre}"></span>
                    <span th:if="${result.totalPages != null}" th:text="' · ' + ${result.totalPages} + ' pàg.'"></span>
                </div>
            </div>

            <form action="/books/add" method="post" class="result-form">
                <input type="hidden" name="title"      th:value="${result.title}">
                <input type="hidden" name="author"     th:value="${result.author}">
                <input type="hidden" name="coverUrl"   th:value="${result.coverUrl}">
                <input type="hidden" name="isbn"       th:value="${result.isbn}">
                <input type="hidden" name="genre"      th:value="${result.genre}">
                <input type="hidden" name="totalPages" th:value="${result.totalPages}">
                <button type="submit" class="btn-add-result">+ Afegir</button>
            </form>

        </div>
    </div>

</main>

</body>
</html>
