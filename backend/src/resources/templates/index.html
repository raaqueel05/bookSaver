<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>la meva prestatgeria</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="header">
    <a href="/" class="logo-link">
        <span class="logo-top">la meva</span>
        <span class="logo-bottom">prestatgeria</span>
    </a>
    <form action="/search-books" method="get" class="header-search">
        <input type="text" name="q" placeholder="cerca un llibre nou...">
        <button type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
    </form>
</header>

<main class="main">

    <nav class="filters">
        <a th:href="@{/}"                   class="filter-btn" th:classappend="${activeStatus == ''}        ? ' active'">
            Tots <span class="filter-count" th:text="${countReading + countRead + countPending + countPaused}"></span>
        </a>
        <a th:href="@{/(status='READING')}"  class="filter-btn" th:classappend="${activeStatus == 'READING'} ? ' active'">
            Llegint <span class="filter-count" th:text="${countReading}"></span>
        </a>
        <a th:href="@{/(status='READ')}"     class="filter-btn" th:classappend="${activeStatus == 'READ'}    ? ' active'">
            Llegits <span class="filter-count" th:text="${countRead}"></span>
        </a>
        <a th:href="@{/(status='PENDING')}"  class="filter-btn" th:classappend="${activeStatus == 'PENDING'} ? ' active'">
            Per llegir <span class="filter-count" th:text="${countPending}"></span>
        </a>
        <a th:href="@{/(status='PAUSED')}"   class="filter-btn" th:classappend="${activeStatus == 'PAUSED'}  ? ' active'">
            Pausats <span class="filter-count" th:text="${countPaused}"></span>
        </a>
    </nav>

    <section class="book-grid">

        <div th:if="${#lists.isEmpty(books)}" class="empty-state">
            <p class="empty-icon">— —</p>
            <p>Aquí no hi ha res encara.<br>Cerca un títol i afegeix el primer!</p>
        </div>

        <a th:each="book : ${books}"
           th:href="@{/books/{id}(id=${book.bookId})}"
           class="book-card"
           th:classappend="'card-' + ${book.status}">
            <div class="book-cover">
                <img th:if="${book.coverUrl != null}" th:src="${book.coverUrl}" th:alt="${book.title}">
                <span th:unless="${book.coverUrl != null}" class="cover-placeholder" th:text="${#strings.substring(book.title, 0, 1)}">?</span>
            </div>
            <div class="book-info">
                <span class="book-title" th:text="${book.title}">Títol</span>
                <span class="book-author" th:text="${book.author}">Autor</span>
                <span th:if="${book.rating != null}" class="book-rating"
                      th:text="${'★★★★★'.substring(0, book.rating) + '☆☆☆☆☆'.substring(0, 5 - book.rating)}">
                </span>
            </div>
        </a>

    </section>

</main>

</body>
</html>
